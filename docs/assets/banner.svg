<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace">
  <defs>
    <!-- background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06060c"/>
      <stop offset="0.4" stop-color="#0a0a18"/>
      <stop offset="0.7" stop-color="#0d0f22"/>
      <stop offset="1" stop-color="#0f1128"/>
    </linearGradient>
    <!-- title gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8e8f8"/>
      <stop offset="0.4" stop-color="#c8c8f0"/>
      <stop offset="0.7" stop-color="#b0b8ff"/>
      <stop offset="1" stop-color="#8899ff"/>
    </linearGradient>
    <!-- accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b5bdb"/>
      <stop offset="0.5" stop-color="#5c7cfa"/>
      <stop offset="1" stop-color="#4c6ef5"/>
    </linearGradient>
    <!-- ice-lobe plasma colormap -->
    <radialGradient id="ice" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fcffa4"/>
      <stop offset="0.18" stop-color="#f0d24a"/>
      <stop offset="0.35" stop-color="#e05a68"/>
      <stop offset="0.55" stop-color="#9c179e"/>
      <stop offset="0.75" stop-color="#5c01a6"/>
      <stop offset="1" stop-color="#0d0887" stop-opacity="0"/>
    </radialGradient>
    <!-- glow for the ice lobe -->
    <radialGradient id="iceGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#cc66ff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#cc66ff" stop-opacity="0"/>
    </radialGradient>
    <!-- top accent line gradient -->
    <linearGradient id="topLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b5bdb" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#3b5bdb"/>
      <stop offset="0.5" stop-color="#cc66ff"/>
      <stop offset="0.8" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <!-- logo ring glow -->
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- subtle star glow -->
    <filter id="starGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- text shadow -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="shadow"/>
      <feFlood flood-color="#3b5bdb" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="shadow" operator="in" result="colorShadow"/>
      <feMerge>
        <feMergeNode in="colorShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- base background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- top accent line -->
  <rect x="0" y="0" width="1200" height="2.5" fill="url(#topLine)"/>

  <!-- subtle grid pattern -->
  <g stroke="#161636" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="85" x2="1200" y2="85"/>
    <line x1="0" y1="255" x2="1200" y2="255"/>
    <line x1="400" y1="0" x2="400" y2="340" opacity="0.3"/>
    <line x1="800" y1="0" x2="800" y2="340" opacity="0.3"/>
  </g>

  <!-- corner coordinates (NASA aesthetic) -->
  <text x="16" y="22" fill="#333366" font-size="9" opacity="0.7">84.5°S 73.2°E</text>
  <text x="1080" y="22" fill="#333366" font-size="9" opacity="0.7">FAUSTINI F2</text>

  <!-- orbital ice-lobe visualization (right side) -->
  <g transform="translate(965,165)">
    <!-- outermost orbit ring -->
    <circle r="135" fill="none" stroke="#1a1a3a" stroke-width="0.5"/>
    <!-- glow aura -->
    <circle r="110" fill="url(#iceGlow)"/>
    <!-- dashed orbit -->
    <circle r="105" fill="none" stroke="#252550" stroke-width="0.8" stroke-dasharray="4 6"/>
    <!-- inner orbit -->
    <circle r="88" fill="none" stroke="#252550" stroke-width="0.8" stroke-dasharray="2 4"/>
    <!-- plasma heatmap (ice lobe) -->
    <circle r="78" fill="url(#ice)"/>
    <!-- contour rings -->
    <circle r="55" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
    <circle r="38" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
    <!-- probability contour label -->
    <text x="42" y="-32" fill="#22d3ee" font-size="8" opacity="0.7">P=0.70</text>
    <text x="58" y="-50" fill="#22d3ee" font-size="8" opacity="0.6">P=0.50</text>
    <!-- traverse path -->
    <path d="M 102 102 C 68 68, 24 34, 4 -6" fill="none" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 102 102 C 68 68, 24 34, 4 -6" fill="none" stroke="#00e5ff" stroke-width="5" opacity="0.15" stroke-linecap="round"/>
    <!-- landing site marker -->
    <rect x="96" y="96" width="10" height="10" rx="1" fill="#ffd700" opacity="0.9"/>
    <text x="112" y="106" fill="#ffd700" font-size="8" opacity="0.8">Site B</text>
    <!-- ice peak star -->
    <g filter="url(#starGlow)">
      <path d="M0,-14 3.5,-4.5 12,-4.5 5.5,1.5 7.5,11 0,5.5 -7.5,11 -5.5,1.5 -12,-4.5 -3.5,-4.5 Z" fill="#ff2bd6"/>
    </g>
  </g>

  <!-- logo mark -->
  <g transform="translate(70,108)">
    <rect x="0" y="0" width="62" height="62" rx="12" fill="#0d0f22" stroke="#3b5bdb" stroke-width="1.5"/>
    <rect x="0" y="0" width="62" height="62" rx="12" fill="none" stroke="#4c6ef5" stroke-width="0.5" opacity="0.5"/>
    <g filter="url(#logoGlow)">
      <circle cx="31" cy="31" r="17" fill="none" stroke="#4c6ef5" stroke-width="2"/>
      <ellipse cx="31" cy="31" rx="28" ry="10" fill="none" stroke="#4c6ef5" stroke-width="1.2" transform="rotate(30 31 31)"/>
    </g>
    <circle cx="31" cy="31" r="4.5" fill="#cc66ff"/>
    <circle cx="31" cy="31" r="7" fill="none" stroke="#cc66ff" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- title: AMRIT -->
  <g filter="url(#textShadow)">
    <text x="152" y="142" fill="url(#titleGrad)" font-size="50" font-weight="700" letter-spacing="6">AMRIT</text>
  </g>

  <!-- subtitle -->
  <text x="156" y="170" fill="#6670a0" font-size="13.5" letter-spacing="4.5">ADVANCED MISSION RESOURCE INTELLIGENCE TOOL</text>

  <!-- divider line -->
  <line x1="152" y1="184" x2="520" y2="184" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>

  <!-- tagline -->
  <text x="70" y="218" fill="#cdd2e6" font-size="17" font-weight="600">Detection → Decision → Traverse → Confidence</text>
  <text x="70" y="246" fill="#777799" font-size="13">Physics-informed subsurface ice likelihood, calibrated uncertainty, and</text>
  <text x="70" y="264" fill="#777799" font-size="13">power-aware mission planning for Chandrayaan-2 DFSAR.</text>

  <!-- badge chips -->
  <g font-size="11">
    <!-- Bharatiya Antariksh 2026 -->
    <rect x="70" y="284" width="158" height="26" rx="5" fill="#0d0f22" stroke="#2a2a55"/>
    <rect x="70" y="284" width="158" height="26" rx="5" fill="none" stroke="#3b5bdb" stroke-width="0.5" opacity="0.3"/>
    <text x="84" y="301" fill="#8899dd">Bharatiya Antariksh 2026</text>

    <!-- Problem Statement 8 -->
    <rect x="238" y="284" width="138" height="26" rx="5" fill="#0d0f22" stroke="#2a2a55"/>
    <rect x="238" y="284" width="138" height="26" rx="5" fill="none" stroke="#cc66ff" stroke-width="0.5" opacity="0.3"/>
    <text x="252" y="301" fill="#bb88ee">Problem Statement 8</text>

    <!-- AUC metric -->
    <rect x="386" y="284" width="130" height="26" rx="5" fill="#0d0f22" stroke="#2a2a55"/>
    <rect x="386" y="284" width="130" height="26" rx="5" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <text x="400" y="301" fill="#66cc88">AUC 0.783 → 0.921</text>

    <!-- ECE metric -->
    <rect x="526" y="284" width="122" height="26" rx="5" fill="#0d0f22" stroke="#2a2a55"/>
    <rect x="526" y="284" width="122" height="26" rx="5" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
    <text x="540" y="301" fill="#55ccdd">ECE 0.241 → 0.031</text>
  </g>

  <!-- bottom accent line -->
  <rect x="0" y="337" width="1200" height="3" fill="url(#topLine)" opacity="0.5"/>
</svg>
